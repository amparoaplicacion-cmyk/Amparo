    </style>
  </defs>

  <!-- Circulo central -->
  <circle cx="170" cy="62" r="26" fill="#EAF4FB"/>

  <!-- Cruz médica -->
  <rect x="166" y="45" width="8" height="24" rx="2" fill="#2E86C1" opacity="0.85"/>
  <rect x="156" y="55" width="28" height="8" rx="2" fill="#2E86C1" opacity="0.85"/>

  <!-- Corazón -->
  <path d="M170,43 C170,43 164.5,37 161,40.5 C157.5,44 163,50 170,55 C177,50 182.5,44 179,40.5 C175.5,37 170,43 170,43 Z" fill="#E74C3C" opacity="0.85"/>

