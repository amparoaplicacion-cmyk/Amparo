{% extends 'admin/base.html' %}

{% block titulo %}Editar — {{ usuario['nombre'] }} {{ usuario['apellido'] }}{% endblock %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">Editar usuario</h1>
  <a href="{{ url_for('admin.usuario_detalle', uid=usuario['id']) }}" class="btn btn-secondary">
    ← Volver al detalle
  </a>
</div>

<div class="form-card">
  <form method="POST"
        action="{{ url_for('admin.usuario_editar', uid=usuario['id']) }}"
        novalidate>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="nombre">Nombre <span class="required">*</span></label>
        <input type="text" id="nombre" name="nombre" class="form-input"
               value="{{ usuario['nombre'] }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="apellido">Apellido <span class="required">*</span></label>
        <input type="text" id="apellido" name="apellido" class="form-input"
               value="{{ usuario['apellido'] }}" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input"
               value="{{ usuario['email'] }}" disabled>
        <span class="form-hint">El email no puede modificarse desde aquí.</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" class="form-input"
               value="{{ usuario['telefono'] or '' }}"
               placeholder="Necesario">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="tipo_usuario">Tipo de usuario <span class="required">*</span></label>
        <select id="tipo_usuario" name="tipo_usuario" class="form-select" required>
          <option value="admin"     {{ 'selected' if usuario['tipo_usuario'] == 'admin'     }}>Admin</option>
          <option value="prestador" {{ 'selected' if usuario['tipo_usuario'] == 'prestador' }}>Prestador</option>
          <option value="solicitante"   {{ 'selected' if usuario['tipo_usuario'] == 'solicitante'   }}>Solicitante</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="estado">Estado <span class="required">*</span></label>
        <select id="estado" name="estado" class="form-select" required>
          <option value="ACTIVA"    {{ 'selected' if usuario['estado'] == 'ACTIVA'    }}>ACTIVA</option>
          <option value="BLOQUEADA" {{ 'selected' if usuario['estado'] == 'BLOQUEADA' }}>BLOQUEADA</option>
          <option value="VENCIDA"   {{ 'selected' if usuario['estado'] == 'VENCIDA'   }}>VENCIDA</option>
          <option value="INACTIVA"  {{ 'selected' if usuario['estado'] == 'INACTIVA'  }}>INACTIVA</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a href="{{ url_for('admin.usuario_detalle', uid=usuario['id']) }}"
         class="btn btn-secondary">Cancelar</a>
    </div>

  </form>
</div>

{% endblock %}
