{% extends 'admin/base.html' %}

{% block titulo %}Nueva Categoría{% endblock %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">Nueva Categoría</h1>
  <a href="{{ url_for('admin.categorias') }}" class="btn btn-secondary">Volver al listado</a>
</div>

<div class="card">
  <form method="POST" action="{{ url_for('admin.categoria_nueva') }}">

    <div class="form-group">
      <label class="form-label">Nombre <span class="required">*</span></label>
      <input type="text" name="nombre" class="form-input"
             value="{{ form.get('nombre', '') }}"
             placeholder="Nombre de la categoría" required>
    </div>

    <div class="form-group">
      <label class="form-label">Descripción <span class="required">*</span></label>
      <textarea name="descripcion" class="form-input" rows="3"
                placeholder="Descripción de la categoría..." required>{{ form.get('descripcion', '') }}</textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Requisitos de formación y documentación</label>
      <textarea name="requisitos" class="form-input" rows="4"
                placeholder="Describí la formación y documentación exigida...">{{ form.get('requisitos', '') }}</textarea>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label class="form-label">Tarifa mínima sugerida ($) <span class="required">*</span></label>
        <input type="number" name="tarifa_minima" class="form-input" min="0" step="1"
               value="{{ form.get('tarifa_minima', '') }}" placeholder="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">Tarifa máxima sugerida ($) <span class="required">*</span></label>
        <input type="number" name="tarifa_maxima" class="form-input" min="0" step="1"
               value="{{ form.get('tarifa_maxima', '') }}" placeholder="0" required>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar categoría</button>
      <a href="{{ url_for('admin.categorias') }}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>
</div>

{% endblock %}
